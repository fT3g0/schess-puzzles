<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>S-Chess Tactics</title>
  <link rel="stylesheet" href="styles.css?v=20260704-drag">
</head>
<body>
  <main class="app">
    <section class="board-area">
      <div class="board-layout">
        <div class="board-shell">
          <div id="board" class="board" aria-label="Chess board"></div>
        </div>
        <div id="reserve" class="reserve-panel" aria-label="Available insert pieces"></div>
      </div>
    </section>
    <aside class="panel">
      <header class="panel-head">
        <div>
          <p id="counter" class="counter">0 / 0</p>
          <h1 id="title">S-Chess Tactics</h1>
        </div>
        <div class="header-actions">
          <button id="theme" class="icon-button" title="Toggle dark mode">DM</button>
          <button id="random" class="icon-button" title="Random puzzle">R</button>
        </div>
      </header>

      <div class="controls">
        <button id="prev">Previous</button>
        <button id="next">Next</button>
        <button id="reset">Reset</button>
        <button id="unmoved" type="button">Castling &amp; gating options</button>
      </div>

      <div class="filters">
        <label><input id="show-hidden" type="checkbox"> Show hidden-by-default</label>
        <div id="hidden-options" class="subfilters hidden">
          <label><input id="show-check" type="checkbox" checked> Check evasions</label>
          <label><input id="show-recapture" type="checkbox" checked> Recaptures</label>
        </div>
        <label>Board theme <select id="board-theme">
          <option value="wood">Wood</option>
          <option value="wood-muted">Muted wood</option>
          <option value="classic">Classic green</option>
          <option value="blue">Blue</option>
          <option value="gray">Gray</option>
        </select></label>
        <button id="category-toggle" type="button">Filter by categories</button>
        <div id="category-options" class="select-filters hidden">
          <label>Phase <select id="phase-filter"><option value="">All</option></select></label>
          <label>Exclude phase <select id="phase-exclude-filter"><option value="">None</option></select></label>
          <label>Motif <select id="motif-filter"><option value="">All</option></select></label>
          <label>Exclude motif <select id="motif-exclude-filter"><option value="">None</option></select></label>
          <label>Length <select id="length-filter"><option value="">All</option></select></label>
          <label>Exclude length <select id="length-exclude-filter"><option value="">None</option></select></label>
        </div>
      </div>

      <p id="status" class="status">Loading puzzles...</p>
      <div id="move-choices" class="move-choices hidden"></div>
      <p id="source" class="source"></p>

      <button id="reveal" class="primary">Reveal solution</button>
      <a id="analysis" class="analysis-link hidden" target="_blank" rel="noopener">Analyze on pychess</a>
      <section id="solution" class="solution hidden">
        <p id="line"></p>
        <p id="details"></p>
      </section>
    </aside>
  </main>
  <script src="app.js?v=20260704-drag"></script>
</body>
</html>
